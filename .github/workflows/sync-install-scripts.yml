# 同步安装脚本到 R2 和 ECS
# 每次 push 到 main 分支时，自动同步 install.sh 和 install.ps1 到多个下载源
# 
# 需要配置的 GitHub Secrets:
# - CLOUDFLARE_API_TOKEN: Cloudflare API Token (R2 读写权限)
# - CLOUDFLARE_ACCOUNT_ID: Cloudflare Account ID
# - ECS_SSH_KEY: ECS 服务器的 SSH 私钥
# - ECS_HOST: ECS 服务器地址 (默认 121.40.150.39)
# - ECS_USER: ECS 用户名 (默认 root)

name: Sync Install Scripts

on:
  push:
    branches: [main]
    paths:
      - 'release/install.sh'
      - 'release/install.ps1'
  workflow_dispatch:  # 支持手动触发

env:
  R2_BUCKET: foralluser
  R2_PUBLIC_DOMAIN: wechat.clawadmin.org
  ECS_PATH: /www/wwwroot/claw-wechat.7color.vip

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "📤 Uploading to Cloudflare R2..."
          
          # install.sh
          curl -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${R2_BUCKET}/objects/install.sh" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --data-binary "@release/install.sh"
          
          # install.ps1
          curl -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${R2_BUCKET}/objects/install.ps1" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --data-binary "@release/install.ps1"
          
          echo "✅ R2 upload complete"

      - name: Upload to ECS
        env:
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_HOST: ${{ secrets.ECS_HOST || '121.40.150.39' }}
          ECS_USER: ${{ secrets.ECS_USER || 'root' }}
        run: |
          echo "📤 Uploading to ECS..."
          
          # 设置 SSH 密钥
          mkdir -p ~/.ssh
          echo "${ECS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 上传文件
          scp -o StrictHostKeyChecking=no \
            release/install.sh release/install.ps1 \
            ${ECS_USER}@${ECS_HOST}:${ECS_PATH}/
          
          # 设置权限
          ssh -o StrictHostKeyChecking=no ${ECS_USER}@${ECS_HOST} \
            "chown www:www ${ECS_PATH}/install.sh ${ECS_PATH}/install.ps1 && chmod 644 ${ECS_PATH}/install.sh ${ECS_PATH}/install.ps1"
          
          echo "✅ ECS upload complete"

      - name: Verify uploads
        run: |
          echo "🔍 Verifying uploads..."
          
          # 验证 R2
          R2_SH=$(curl -s -o /dev/null -w "%{http_code}" https://${R2_PUBLIC_DOMAIN}/install.sh)
          R2_PS1=$(curl -s -o /dev/null -w "%{http_code}" https://${R2_PUBLIC_DOMAIN}/install.ps1)
          
          # 验证 ECS
          ECS_SH=$(curl -s -o /dev/null -w "%{http_code}" https://claw-wechat.7color.vip/install.sh)
          ECS_PS1=$(curl -s -o /dev/null -w "%{http_code}" https://claw-wechat.7color.vip/install.ps1)
          
          echo "| Source       | install.sh | install.ps1 |"
          echo "|--------------|------------|-------------|"
          echo "| R2 (CDN)     | ${R2_SH}         | ${R2_PS1}          |"
          echo "| ECS (Backup) | ${ECS_SH}         | ${ECS_PS1}          |"
          
          if [ "$R2_SH" != "200" ] || [ "$R2_PS1" != "200" ] || [ "$ECS_SH" != "200" ] || [ "$ECS_PS1" != "200" ]; then
            echo "❌ Some uploads failed!"
            exit 1
          fi
          
          echo "✅ All uploads verified!"