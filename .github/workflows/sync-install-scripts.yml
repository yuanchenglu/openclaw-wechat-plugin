# 完整同步仓库到 R2 和 ECS
# 每次 push 到 main 分支时，自动同步整个仓库到多个下载源
# 
# 需要配置的 GitHub Secrets:
# - CLOUDFLARE_API_TOKEN: Cloudflare API Token (R2 读写权限)
# - CLOUDFLARE_ACCOUNT_ID: Cloudflare Account ID
# - ECS_SSH_KEY: ECS 服务器的 SSH 私钥
# - ECS_HOST: ECS 服务器地址 (默认 121.40.150.39)
# - ECS_USER: ECS 用户名 (默认 root)

name: Sync Source to R2 and ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  R2_BUCKET: foralluser
  R2_PUBLIC_DOMAIN: wechat.clawadmin.org
  ECS_PATH: /www/wwwroot/claw-wechat.7color.vip

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "📤 Uploading repository to Cloudflare R2..."
          
          # 遍历所有文件并上传，排除 .git 和 .github 目录
          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name '.gitignore' \
            | while read file; do
              # 移除开头的 ./
              key="${file#./}"
              echo "  ↑ $key"
              curl -s -X PUT \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${R2_BUCKET}/objects/${key}" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                --data-binary "@$file"
            done
          
          echo "✅ R2 upload complete"

      - name: Upload to ECS
        env:
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_HOST: ${{ secrets.ECS_HOST || '121.40.150.39' }}
          ECS_USER: ${{ secrets.ECS_USER || 'root' }}
        run: |
          echo "📤 Uploading repository to ECS..."
          
          mkdir -p ~/.ssh
          echo "${ECS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 使用 rsync 同步整个仓库，排除 .git 和 .github
          # 不使用 --delete，避免删除 ECS 上的系统文件（如 .user.ini, .htaccess 等）
          rsync -avz \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${ECS_USER}@${ECS_HOST}:${ECS_PATH}/
          
          # 设置权限（排除系统保护文件）
          ssh -o StrictHostKeyChecking=no ${ECS_USER}@${ECS_HOST} \
            "find ${ECS_PATH} -type f ! -name '.user.ini' -exec chown www:www {} \; 2>/dev/null || true; find ${ECS_PATH} -type d -exec chown www:www {} \; 2>/dev/null || true; find ${ECS_PATH} -type f -exec chmod 644 {} \; 2>/dev/null || true; find ${ECS_PATH} -type d -exec chmod 755 {} \; 2>/dev/null || true"
          
          echo "✅ ECS upload complete"

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          
          # 核心安装文件（R2 和 ECS 都必须成功）
          CORE_FILES=(
            "release/install.sh"
            "release/install.ps1"
          )
          
          # 源码文件（仅 R2 必须成功，ECS 仅警告）
          SOURCE_FILES=(
            "src/client.py"
            "requirements.txt"
          )
          
          echo "### 核心安装文件"
          echo "| File | R2 Status | ECS Status |"
          echo "|------|-----------|------------|"
          
          ALL_OK=true
          for file in "${CORE_FILES[@]}"; do
            R2_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${R2_PUBLIC_DOMAIN}/${file}")
            ECS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://claw-wechat.7color.vip/${file}")
            echo "| $file | ${R2_STATUS} | ${ECS_STATUS} |"
            
            if [ "$R2_STATUS" != "200" ] || [ "$ECS_STATUS" != "200" ]; then
              ALL_OK=false
            fi
          done
          
          echo ""
          echo "### 源码文件"
          echo "| File | R2 Status | ECS Status |"
          echo "|------|-----------|------------|"
          
          for file in "${SOURCE_FILES[@]}"; do
            R2_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${R2_PUBLIC_DOMAIN}/${file}")
            ECS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://claw-wechat.7color.vip/${file}")
            echo "| $file | ${R2_STATUS} | ${ECS_STATUS} |"
            
            if [ "$R2_STATUS" != "200" ]; then
              echo "⚠️ R2 源码文件 $file 不可用"
              ALL_OK=false
            fi
            if [ "$ECS_STATUS" != "200" ]; then
              echo "⚠️ ECS 源码文件 $file 不可用（不影响安装，用户使用 R2 下载）"
            fi
          done
          
          if [ "$ALL_OK" != "true" ]; then
            echo "❌ 核心文件验证失败！"
            exit 1
          fi
          
          echo "✅ 核心部署验证通过！"